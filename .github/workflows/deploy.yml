name: Build and push Docker image

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU is only required if you plan to build multi-platform images (e.g., linux/amd64, linux/arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Ensures the repository name is lowercase to prevent Docker build failures
      - name: Lowercase repository name
        id: repo-name
        run: |
          echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # Dynamically extracts tags and labels based on GitHub events (main branch vs. semver tags)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo-name.outputs.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Recommended for enterprise builds to optimize pipeline execution time
          cache-from: type=gha
          cache-to: type=gha,mode=max